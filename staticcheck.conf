# Staticcheck configuration for golars.
#
# SA6002: sync.Pool stores non-pointer types (arrow.Buffer handles,
#   []byte, etc.). Accepted tradeoff: the pool recycles the shape of
#   the backing allocation, and the wrapper overhead is measured
#   negligible vs the allocator savings.
#
# U1000: unused identifiers. Many compute / scatter kernels are
#   guarded by build tags (GOEXPERIMENT=simd, noasm, amd64) that
#   staticcheck does not evaluate, so it reports SIMD helpers as
#   unused even when they are the hot path on the real build.
checks = [
    "all",
    "-SA6002", # sync.Pool tradeoff accepted (see above).
    "-U1000",  # build-tag-guarded helpers read as unused.
    "-ST1003", # scatterUint64_8_prefetch2 and friends keep asm-style
               # underscore names so stack traces line up with the .s
               # source; renaming to ScatterUint648Prefetch2 hurts
               # grep-ability.
    "-ST1020", # doc-comment form is consistent across the codebase
               # but not always starts with the exported name verbatim
               # (aliases / grouped declarations).
    "-SA9003", # the empty-if handlers are intentional safety valves.
]
